name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (kerberos)
        run: |
          sudo apt-get update && sudo apt-get install -y libkrb5-dev
          cargo clippy --all-targets --features kerberos -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run
      - name: Run doc tests
        run: cargo test --doc

  test-kerberos:
    name: Test (kerberos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Install libkrb5-dev
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
      - run: cargo nextest run --features kerberos
      - run: cargo test --doc --features kerberos

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      # The `kerberos` feature pulls `cross-krb5` which needs krb5 dev
      # headers (gssapi.h) to build its `libgssapi-sys` bindings.
      - name: Install krb5 dev headers
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev
      - run: cargo doc --no-deps --all-features

  msrv:
    name: MSRV (1.94.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans

  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_ntlm_parse
          - fuzz_ntlm_seal
          - fuzz_ntlm_challenge_header
          - fuzz_powershell_encode
          - fuzz_soap_parse
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzzer (${{ matrix.target }})
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=30

  semver:
    name: Semver check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
      - uses: obi1kenobi/cargo-semver-checks-action@v2

  # Gate job — add this to branch protection rules
  ci-pass:
    name: CI passed
    if: always()
    needs:
      - fmt
      - clippy
      - test
      - test-kerberos
      - coverage
      - doc
      - msrv
      - audit
      - deny
      - fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          results=( \
            "${{ needs.fmt.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.test-kerberos.result }}" \
            "${{ needs.coverage.result }}" \
            "${{ needs.doc.result }}" \
            "${{ needs.msrv.result }}" \
            "${{ needs.audit.result }}" \
            "${{ needs.deny.result }}" \
            "${{ needs.fuzz.result }}" \
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" ]]; then
              echo "::error::One or more required jobs failed"
              exit 1
            fi
          done
          echo "All required jobs passed"
